<div
  id="backend-error-modal"
  class="modal"
  role="dialog"
  aria-modal="true"
  aria-labelledby="backend-error-title"
  data-invalid-fields="{{ invalid_fields }}"
  tabindex="-1"
>
  <div class="modal__card">
    <h2 id="backend-error-title">{{ title }}</h2>
    <p>{{ message }}</p>
    <button type="button" data-close-modal>Fechar</button>
  </div>
</div>
