<dialog class="delete-dialog" data-delete-dialog>
  <form method="dialog" class="delete-dialog__card">
    <p class="eyebrow">Cadastro Unico</p>
    <h2>Excluir cadastro</h2>
    <p data-delete-summary>Confirme a exclusao do cadastro selecionado.</p>
    <div class="delete-dialog__actions">
      <button type="submit" value="cancel" class="button button--secondary">Cancelar</button>
      <button type="submit" data-confirm-delete class="button button--danger">Excluir</button>
    </div>
  </form>
</dialog>
